<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda semanal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --bg-page:#f7f6f3; --surface-1:#fdfcfa; --surface-2:#ffffff;
    --border:#e4e2dc; --border-strong:#cfccc3;
    --text-primary:#1d1c1a; --text-secondary:#5f5e5a; --text-muted:#8c8a82;
    --accent:#185fa5; --bg-accent:#e6f1fb; --border-accent:#85b7eb;
    --danger:#791f1f; --bg-danger:#fcebeb; --border-danger:#f09595;
    --success:#085041; --bg-success:#e1f5ee;
    --warning:#633806; --bg-warning:#faeeda;
    --radius:8px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg-page:#161513; --surface-1:#211f1c; --surface-2:#272521;
      --border:#3a3833; --border-strong:#4a4842;
      --text-primary:#f1efe8; --text-secondary:#b4b2a9; --text-muted:#888780;
      --accent:#85b7eb; --bg-accent:#0c447c; --border-accent:#378add;
      --danger:#f7c1c1; --bg-danger:#791f1f;
      --success:#9fe1cb; --bg-success:#085041;
      --warning:#fac775; --bg-warning:#854f0b;
    }
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg-page); color:var(--text-primary);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    padding:1.5rem; max-width:720px; margin:0 auto;
  }
  h1{ font-size:20px; font-weight:500; margin:0 0 1.5rem; }
  input, select, button{
    font-family:inherit; font-size:14px; border-radius:var(--radius);
    border:0.5px solid var(--border-strong); background:var(--surface-2);
    color:var(--text-primary); padding:8px 10px; height:36px;
  }
  button{ cursor:pointer; }
  button:active{ transform:scale(0.98); }
  button:hover{ background:var(--surface-1); }
  .card{ background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:1rem 1.25rem; margin-bottom:1.5rem; }
  .row{ display:grid; gap:8px; margin-bottom:8px; }
  .row-3{ grid-template-columns:2fr 1fr 1fr; }
  .row-4{ grid-template-columns:1fr 1fr 1fr 1fr; }
  .summary{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:1.5rem; }
  .metric{ background:var(--surface-1); border-radius:var(--radius); padding:1rem; }
  .metric p:first-child{ font-size:12px; color:var(--text-secondary); margin:0 0 4px; }
  .metric p:last-child{ font-size:22px; font-weight:500; margin:0; }
  .section-title{ font-size:14px; font-weight:500; color:var(--text-secondary); margin:0 0 8px; display:flex; align-items:center; gap:6px; }
  .matrix{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:1.5rem; }
  .quadrant{ border-radius:12px; padding:10px; }
  .quadrant p.qt{ font-size:13px; font-weight:500; margin:0; }
  .quadrant p.qs{ font-size:11px; color:var(--text-secondary); margin:0 0 8px; }
  .task{ background:var(--surface-2); border-radius:var(--radius); padding:8px 10px; display:flex; flex-direction:column; gap:4px; margin-bottom:6px; }
  .task .top{ display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
  .task .name{ font-size:13px; font-weight:500; margin:0; flex:1; }
  .task .meta{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .badge{ font-size:11px; padding:2px 8px; border-radius:var(--radius); font-weight:500; }
  .icon-btn{ border:0.5px solid var(--border-strong); background:var(--surface-1); padding:4px 8px; height:auto; font-size:12px; display:inline-flex; align-items:center; gap:4px; }
  .week{ display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; margin-bottom:1.5rem; }
  @media (max-width: 700px){
    body{ padding:1rem; }
    h1{ font-size:18px; }
    .row-3{ grid-template-columns:1fr; }
    .row-4{ grid-template-columns:1fr 1fr; }
    .summary{ grid-template-columns:1fr 1fr; }
    .matrix{ grid-template-columns:1fr !important; }
    .week{ grid-template-columns:repeat(4,minmax(0,1fr)); }
    input, select, button{ font-size:16px; }
    .task .top{ align-items:center; }
    .task .name{ flex:1; min-width:0; }
    .icon-btn{ padding:6px 10px; font-size:16px; }
  }
  .day{ background:var(--surface-1); border-radius:var(--radius); padding:8px 6px; min-height:60px; }
  .day p:first-child{ font-size:11px; font-weight:500; color:var(--text-secondary); margin:0 0 6px; }
  .day p:last-child{ font-size:18px; font-weight:500; margin:0; }
  .recur-row{ display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--radius); background:var(--surface-1); margin-bottom:6px; }
  .day-chip{ padding:6px 10px; font-size:12px; }
  .cat-trabajo{ background:#E6F1FB; color:#0C447C; }
  .cat-personal{ background:#FBEAF0; color:#72243E; }
  .cat-proyecto{ background:#FAEEDA; color:#633806; }
  @media (prefers-color-scheme: dark){
    .cat-trabajo{ background:#0C447C; color:#B5D4F4; }
    .cat-personal{ background:#72243E; color:#F4C0D1; }
    .cat-proyecto{ background:#633806; color:#FAC775; }
  }
  #status-bar{ font-size:12px; color:var(--text-muted); margin-bottom:1rem; display:flex; align-items:center; gap:6px; }
  #status-dot{ width:7px; height:7px; border-radius:50%; background:var(--text-muted); }
  #status-dot.online{ background:var(--success); }
</style>
</head>
<body>

<h1><i class="ti ti-calendar" style="vertical-align:-3px; margin-right:6px;"></i>Agenda semanal</h1>
<div id="status-bar"><span id="status-dot"></span><span id="status-text">Conectando...</span></div>

<div class="card">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
    <p id="form-title" style="font-size:14px; font-weight:500; margin:0;"><i class="ti ti-plus" style="margin-right:6px;"></i>Nueva tarea</p>
  </div>
  <div class="row row-3">
    <input id="t-name" type="text" placeholder="Nombre de la tarea">
    <select id="t-cat">
      <option value="trabajo">Trabajo</option>
      <option value="personal">Personal</option>
      <option value="proyecto">Proyecto especial</option>
    </select>
    <select id="t-effort">
      <option value="corto">Esfuerzo corto</option>
      <option value="medio" selected>Esfuerzo medio</option>
      <option value="largo">Esfuerzo largo</option>
    </select>
  </div>
  <div class="row row-4">
    <select id="t-urgent"><option value="1">Urgente</option><option value="0">No urgente</option></select>
    <select id="t-important"><option value="1">Importante</option><option value="0">No importante</option></select>
    <select id="t-day">
      <option value="">Día (opcional)</option>
      <option>Lunes</option><option>Martes</option><option>Miércoles</option>
      <option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
    </select>
    <input id="t-due" type="date">
  </div>
  <label id="recurring-label" style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer; margin-bottom:8px;">
    <input id="t-recurring" type="checkbox" style="width:auto; height:auto;">
    <span><i class="ti ti-repeat" style="margin-right:4px;"></i>Tarea recurrente (elige los días que se repite)</span>
  </label>
  <div id="recurring-days" style="display:none; flex-wrap:wrap; gap:6px; margin-bottom:10px;">
    <button type="button" class="day-chip" data-day="Lunes">Lun</button>
    <button type="button" class="day-chip" data-day="Martes">Mar</button>
    <button type="button" class="day-chip" data-day="Miércoles">Mié</button>
    <button type="button" class="day-chip" data-day="Jueves">Jue</button>
    <button type="button" class="day-chip" data-day="Viernes">Vie</button>
    <button type="button" class="day-chip" data-day="Sábado">Sáb</button>
    <button type="button" class="day-chip" data-day="Domingo">Dom</button>
  </div>
  <div style="display:flex; gap:8px;">
    <button id="add-btn" type="button" style="flex:1; font-weight:500;"><i class="ti ti-plus" style="margin-right:4px;"></i>Agregar tarea</button>
    <button id="cancel-edit-btn" type="button" style="display:none;">Cancelar</button>
  </div>
</div>

<div class="summary" id="summary"></div>

<p class="section-title"><i class="ti ti-layout-grid"></i>Matriz de prioridad</p>
<div class="matrix" id="matrix"></div>

<p class="section-title"><i class="ti ti-calendar"></i>Carga semanal</p>
<div class="week" id="week"></div>

<p class="section-title"><i class="ti ti-repeat"></i>Recurrentes activas</p>
<div id="recurring-list" style="margin-bottom:1.5rem;"></div>

<button id="hist-toggle" type="button" style="font-size:13px; color:var(--text-secondary); margin-bottom:8px;">
  <i class="ti ti-chevron-down" id="hist-chevron"></i> Historial / completadas (<span id="hist-count">0</span>)
</button>
<div id="hist-wrap" style="display:none;">
  <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
    <button id="hist-clear" type="button" style="font-size:12px;">Vaciar historial</button>
  </div>
  <div id="history"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLc5rRLYl4dya15Gm0twDbFrVj42kH2tk",
  authDomain: "proyecto-agenda-501016-9ff97.firebaseapp.com",
  databaseURL: "https://proyecto-agenda-501016-9ff97-default-rtdb.firebaseio.com",
  projectId: "proyecto-agenda-501016-9ff97",
  storageBucket: "proyecto-agenda-501016-9ff97.firebasestorage.app",
  messagingSenderId: "943297381815",
  appId: "1:943297381815:web:10627482888b0d54539432"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, 'agenda');

const catLabel = { trabajo: 'Trabajo', personal: 'Personal', proyecto: 'Proyecto especial' };
const catClass = { trabajo: 'cat-trabajo', personal: 'cat-personal', proyecto: 'cat-proyecto' };
const effortLabel = { corto: 'Corto', medio: 'Medio', largo: 'Largo' };
const days = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let tasks = [];
let history = [];
let recurring = [];
let idCounter = 1;
let recurIdCounter = 1;
let selectedRecurDays = [];
let editingTaskId = null;
let loaded = false;
let isRemoteUpdate = false;

function quadrant(t){
  if(t.urgent && t.important) return 'q1';
  if(!t.urgent && t.important) return 'q2';
  if(t.urgent && !t.important) return 'q3';
  return 'q4';
}

const quadrantMeta = {
  q1: { title: 'Hacer ahora', sub: 'Urgente + importante', bg: 'var(--bg-danger)' },
  q2: { title: 'Planificar', sub: 'No urgente + importante', bg: 'var(--bg-success)' },
  q3: { title: 'Delegar', sub: 'Urgente + no importante', bg: 'var(--bg-warning)' },
  q4: { title: 'Posponer', sub: 'No urgente + no importante', bg: 'var(--surface-1)' }
};

function daysUntil(dateStr){
  if(!dateStr) return null;
  return (new Date(dateStr + 'T23:59:59') - new Date()) / 36e5;
}

function fmtDate(dateStr){
  if(!dateStr) return '';
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
}

function persist(){
  if(isRemoteUpdate) return;
  set(dataRef, { tasks, history, recurring, idCounter, recurIdCounter });
}

function ensureRecurringInstances(){
  recurring.forEach(r => {
    r.days.forEach(d => {
      const exists = tasks.some(t => t.recurringId === r.id && t.day === d && !t.completed);
      if(!exists){
        tasks.push({ id: 'task-' + (idCounter++), name: r.name, category: r.category, effort: r.effort, urgent: r.urgent, important: r.important, day: d, dueDate: '', completed: false, recurringId: r.id });
      }
    });
  });
}

function taskCard(t){
  const hrs = daysUntil(t.dueDate);
  const isUrgentDue = hrs !== null && hrs <= 48;
  return `<div class="task" style="${isUrgentDue ? 'border:0.5px solid var(--border-danger);' : ''}">
    <div class="top">
      <p class="name">${t.recurringId ? '<i class="ti ti-repeat" style="font-size:12px; color:var(--text-muted); margin-right:3px;"></i>' : ''}${t.name}</p>
      <div style="display:flex; gap:2px;">
        <button class="icon-btn" data-edit="${t.id}" type="button" aria-label="Editar tarea">✎</button>
        <button class="icon-btn" data-complete="${t.id}" type="button" aria-label="Completar tarea">✓</button>
      </div>
    </div>
    <div class="meta">
      <span class="badge ${catClass[t.category]}">${catLabel[t.category]}</span>
      <span style="font-size:11px; color:var(--text-muted);">${effortLabel[t.effort]}</span>
      ${t.dueDate ? `<span style="font-size:11px; ${isUrgentDue ? 'color:var(--danger); font-weight:500;' : 'color:var(--text-muted);'}">${isUrgentDue ? '<i class="ti ti-alert-triangle" style="font-size:12px;"></i> ' : ''}${fmtDate(t.dueDate)}</span>` : ''}
      ${t.day ? `<span style="font-size:11px; color:var(--text-muted);">${t.day}</span>` : ''}
    </div>
  </div>`;
}

function render(){
  if(!loaded) return;
  const pending = tasks.filter(t => !t.completed);
  const q1 = pending.filter(t => quadrant(t)==='q1');
  const today = new Date(); today.setHours(0,0,0,0);
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate()+7);
  const dueThisWeek = pending.filter(t => t.dueDate && new Date(t.dueDate+'T00:00:00') >= today && new Date(t.dueDate+'T00:00:00') <= weekEnd);
  const completedToday = history.filter(t => t.completedAt && new Date(t.completedAt).toDateString() === new Date().toDateString());

  document.getElementById('summary').innerHTML = `
    <div class="metric"><p>Pendientes</p><p>${pending.length}</p></div>
    <div class="metric"><p>Hacer ahora</p><p>${q1.length}</p></div>
    <div class="metric"><p>Vencen esta semana</p><p>${dueThisWeek.length}</p></div>
    <div class="metric"><p>Completadas hoy</p><p>${completedToday.length}</p></div>
  `;

  document.getElementById('matrix').innerHTML = ['q1','q2','q3','q4'].map(qid => {
    const meta = quadrantMeta[qid];
    let list = pending.filter(t => quadrant(t)===qid).sort((a,b) => {
      if(!a.dueDate && !b.dueDate) return 0;
      if(!a.dueDate) return 1;
      if(!b.dueDate) return -1;
      return new Date(a.dueDate) - new Date(b.dueDate);
    });
    return `<div class="quadrant" style="background:${meta.bg};">
      <p class="qt">${meta.title}</p><p class="qs">${meta.sub}</p>
      ${list.length ? list.map(taskCard).join('') : '<p style="font-size:12px; color:var(--text-muted); margin:0;">Sin tareas</p>'}
    </div>`;
  }).join('');

  document.getElementById('week').innerHTML = days.map(d => {
    const dayTasks = pending.filter(t => t.day === d);
    return `<div class="day"><p>${d.slice(0,3)}</p><p>${dayTasks.length}</p></div>`;
  }).join('');

  document.getElementById('recurring-list').innerHTML = recurring.length
    ? recurring.map(r => `<div class="recur-row">
        <i class="ti ti-repeat" style="color:var(--text-muted);"></i>
        <span style="font-size:13px; flex:1;">${r.name}</span>
        <span class="badge ${catClass[r.category]}" style="font-size:10px;">${catLabel[r.category]}</span>
        <span style="font-size:11px; color:var(--text-muted);">${r.days.map(d => d.slice(0,3)).join(', ')}</span>
        <button class="icon-btn" data-remove-recurring="${r.id}" type="button" aria-label="Eliminar recurrencia">✕</button>
      </div>`).join('')
    : '<p style="font-size:12px; color:var(--text-muted);">Sin tareas recurrentes</p>';

  document.getElementById('hist-count').textContent = history.length;
  document.getElementById('history').innerHTML = history.length
    ? history.slice().reverse().map(t => `<div class="recur-row"><span style="font-size:12px; text-decoration:line-through; color:var(--text-muted); flex:1;">${t.name}</span><span class="badge ${catClass[t.category]}" style="font-size:10px;">${catLabel[t.category]}</span><button class="icon-btn" data-restore="${t.id}" type="button" aria-label="Restaurar tarea">↺</button></div>`).join('')
    : '<p style="font-size:12px; color:var(--text-muted);">Vacío</p>';
}

function completeTask(id){
  const t = tasks.find(x => x.id === id);
  if(!t || t.completed) return;
  t.completed = true;
  render(); persist();
  setTimeout(() => {
    t.completedAt = new Date().toISOString();
    tasks = tasks.filter(x => x.id !== id);
    history.push(t);
    if(t.recurringId) ensureRecurringInstances();
    render(); persist();
  }, 2500);
}

function removeRecurring(id){
  recurring = recurring.filter(r => r.id !== id);
  tasks = tasks.filter(t => t.recurringId !== id);
  render(); persist();
}

function restoreTask(id){
  const idx = history.findIndex(x => x.id === id);
  if(idx === -1) return;
  const t = history[idx];
  history.splice(idx, 1);
  delete t.completedAt;
  t.completed = false;
  tasks.push(t);
  render(); persist();
}

function startEdit(id){
  const t = tasks.find(x => x.id === id);
  if(!t) return;
  editingTaskId = id;
  document.getElementById('t-name').value = t.name;
  document.getElementById('t-cat').value = t.category;
  document.getElementById('t-effort').value = t.effort;
  document.getElementById('t-urgent').value = t.urgent ? '1' : '0';
  document.getElementById('t-important').value = t.important ? '1' : '0';
  document.getElementById('t-day').value = t.day || '';
  document.getElementById('t-due').value = t.dueDate || '';
  document.getElementById('form-title').innerHTML = '<i class="ti ti-edit" style="margin-right:6px;"></i>Editando tarea';
  document.getElementById('add-btn').innerHTML = '<i class="ti ti-check" style="margin-right:4px;"></i>Guardar cambios';
  document.getElementById('cancel-edit-btn').style.display = 'inline-flex';
  const recLabel = document.getElementById('recurring-label');
  recLabel.style.opacity = t.recurringId ? '0.5' : '1';
  recLabel.style.pointerEvents = t.recurringId ? 'none' : 'auto';
  const card = document.querySelector('.card');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  card.style.transition = 'box-shadow 0.3s';
  card.style.boxShadow = '0 0 0 2px var(--accent)';
  setTimeout(() => { card.style.boxShadow = 'none'; }, 1200);
  document.getElementById('t-name').focus();
}

function resetForm(){
  editingTaskId = null;
  document.getElementById('t-name').value = '';
  document.getElementById('t-due').value = '';
  document.getElementById('t-day').value = '';
  document.getElementById('t-cat').value = 'trabajo';
  document.getElementById('t-effort').value = 'medio';
  document.getElementById('t-urgent').value = '1';
  document.getElementById('t-important').value = '1';
  document.getElementById('form-title').innerHTML = '<i class="ti ti-plus" style="margin-right:6px;"></i>Nueva tarea';
  document.getElementById('add-btn').innerHTML = '<i class="ti ti-plus" style="margin-right:4px;"></i>Agregar tarea';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  document.getElementById('recurring-label').style.opacity = '1';
  document.getElementById('recurring-label').style.pointerEvents = 'auto';
}

document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

document.getElementById('t-recurring').addEventListener('change', (e) => {
  document.getElementById('recurring-days').style.display = e.target.checked ? 'flex' : 'none';
  document.getElementById('t-day').disabled = e.target.checked;
  document.getElementById('t-due').disabled = e.target.checked;
});

document.getElementById('recurring-days').addEventListener('click', (e) => {
  const chip = e.target.closest('.day-chip');
  if(!chip) return;
  const d = chip.getAttribute('data-day');
  if(selectedRecurDays.includes(d)){
    selectedRecurDays = selectedRecurDays.filter(x => x !== d);
    chip.style.background = 'var(--surface-2)';
    chip.style.borderColor = 'var(--border-strong)';
  } else {
    selectedRecurDays.push(d);
    chip.style.background = 'var(--bg-accent)';
    chip.style.borderColor = 'var(--border-accent)';
  }
});

document.getElementById('add-btn').addEventListener('click', () => {
  const name = document.getElementById('t-name').value.trim();
  if(!name) return;
  const category = document.getElementById('t-cat').value;
  const effort = document.getElementById('t-effort').value;
  const urgent = document.getElementById('t-urgent').value === '1';
  const important = document.getElementById('t-important').value === '1';

  if(editingTaskId){
    const t = tasks.find(x => x.id === editingTaskId);
    if(t){
      t.name = name; t.category = category; t.effort = effort; t.urgent = urgent; t.important = important;
      if(!t.recurringId){
        t.day = document.getElementById('t-day').value;
        t.dueDate = document.getElementById('t-due').value;
      }
    }
    resetForm(); render(); persist();
    return;
  }

  const isRecurring = document.getElementById('t-recurring').checked;
  if(isRecurring){
    if(selectedRecurDays.length === 0) return;
    const r = { id: 'recur-' + (recurIdCounter++), name, category, effort, urgent, important, days: [...selectedRecurDays] };
    recurring.push(r);
    ensureRecurringInstances();
    document.getElementById('t-recurring').checked = false;
    document.getElementById('recurring-days').style.display = 'none';
    document.getElementById('t-day').disabled = false;
    document.getElementById('t-due').disabled = false;
    selectedRecurDays = [];
    document.querySelectorAll('.day-chip').forEach(c => { c.style.background = 'var(--surface-2)'; c.style.borderColor = 'var(--border-strong)'; });
  } else {
    tasks.push({ id: 'task-' + (idCounter++), name, category, effort, urgent, important, day: document.getElementById('t-day').value, dueDate: document.getElementById('t-due').value, completed: false });
  }
  document.getElementById('t-name').value = '';
  document.getElementById('t-due').value = '';
  document.getElementById('t-day').value = '';
  render(); persist();
});

document.getElementById('hist-toggle').addEventListener('click', () => {
  const wrap = document.getElementById('hist-wrap');
  const chevron = document.getElementById('hist-chevron');
  const open = wrap.style.display !== 'none';
  wrap.style.display = open ? 'none' : 'block';
  chevron.style.transform = open ? 'rotate(0deg)' : 'rotate(-180deg)';
});

document.getElementById('hist-clear').addEventListener('click', () => {
  history = [];
  render(); persist();
});

document.getElementById('history').addEventListener('click', (e) => {
  const restoreBtn = e.target.closest('[data-restore]');
  if(restoreBtn){ restoreTask(restoreBtn.getAttribute('data-restore')); }
});

document.getElementById('matrix').addEventListener('click', (e) => {
  const completeBtn = e.target.closest('[data-complete]');
  if(completeBtn){ completeTask(completeBtn.getAttribute('data-complete')); return; }
  const editBtn = e.target.closest('[data-edit]');
  if(editBtn){ startEdit(editBtn.getAttribute('data-edit')); }
});

document.getElementById('recurring-list').addEventListener('click', (e) => {
  const removeBtn = e.target.closest('[data-remove-recurring]');
  if(removeBtn){ removeRecurring(removeBtn.getAttribute('data-remove-recurring')); }
});

const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

onValue(dataRef, (snapshot) => {
  const data = snapshot.val();
  isRemoteUpdate = true;
  if(data){
    tasks = data.tasks || [];
    history = data.history || [];
    recurring = data.recurring || [];
    idCounter = data.idCounter || 1;
    recurIdCounter = data.recurIdCounter || 1;
  }
  loaded = true;
  statusDot.classList.add('online');
  statusText.textContent = 'Sincronizado';
  ensureRecurringInstances();
  render();
  isRemoteUpdate = false;
}, (error) => {
  statusText.textContent = 'Error de conexión';
});
</script>
</body>
</html>
